<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 网页翻译</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>AI 网页翻译</h1>
      <span class="status-dot" id="statusDot"></span>
    </div>

    <div class="actions">
      <button id="translateFullPage" class="btn">
        <span class="btn-icon">🌐</span>
        <span>翻译整页</span>
      </button>

      <button id="translateSelection" class="btn">
        <span class="btn-icon">📝</span>
        <span>翻译选中</span>
      </button>

      <button id="translateBlock" class="btn">
        <span class="btn-icon">🔲</span>
        <span>选择块翻译</span>
      </button>

      <button id="toggleTranslation" class="btn">
        <span class="btn-icon" id="toggleIcon">↩️</span>
        <span id="toggleLabel">恢复原文</span>
      </button>
    </div>

    <div class="settings-summary">
      <div class="setting-item">
        <span class="setting-label">模型</span>
        <span class="setting-value" id="currentModel">-</span>
      </div>
      <div class="setting-item">
        <span class="setting-label">目标语言</span>
        <span class="setting-value" id="currentTargetLang">-</span>
      </div>
    </div>

    <div class="popup-toggles">
      <label class="popup-toggle">
        <span>自动翻译</span>
        <label class="toggle-switch">
          <input type="checkbox" id="popupAutoTranslate" />
          <span class="toggle-slider"></span>
        </label>
      </label>
      <label class="popup-toggle popup-toggle--sub">
        <span>无需确认直接翻译</span>
        <label class="toggle-switch">
          <input type="checkbox" id="popupAutoTranslateNoConfirm" />
          <span class="toggle-slider"></span>
        </label>
      </label>
    </div>

    <div class="footer">
      <a href="#" id="openOptions" class="link">设置</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
