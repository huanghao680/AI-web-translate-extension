<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 网页翻译 - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>设置</h1>

    <section class="section">
      <h2>配置管理</h2>
      <div class="profile-list" id="profileList"></div>
      <div class="profile-actions">
        <button id="addProfileBtn" class="btn btn-secondary btn-sm">＋ 新建配置</button>
      </div>
    </section>

    <section class="section" id="profileEditor" style="display:none;">
      <h2 id="editorTitle">编辑配置</h2>
      <input type="hidden" id="profileId" />
      <div class="form-group">
        <label for="profileName">配置名称</label>
        <input type="text" id="profileName" placeholder="DeepSeek" />
      </div>
      <div class="form-group">
        <label for="profileBaseUrl">API Base URL</label>
        <input type="url" id="profileBaseUrl" placeholder="https://api.deepseek.com" />
        <span class="hint">支持 OpenAI 兼容 API 格式的服务地址</span>
      </div>
      <div class="form-group">
        <label for="profileApiKey">API Key</label>
        <input type="password" id="profileApiKey" placeholder="sk-" />
        <span class="hint">用于调用大语言模型 API 的密钥</span>
      </div>
      <div class="form-group" style="position:relative;">
        <label for="profileModel">模型名称</label>
        <div class="model-select-row">
          <select id="profileModel">
            <option value="">手动输入...</option>
          </select>
          <button id="refreshProfileModels" class="btn btn-small" type="button" title="从 API 获取模型列表">🔄</button>
        </div>
        <input type="text" id="profileModelCustom" placeholder="deepseek-v4-flash" style="display:none;margin-top:6px;" />
        <span class="hint">选择或手动输入模型名称</span>
      </div>
      <div class="form-group">
        <label for="profileMaxTokens">最大输出 Tokens</label>
        <input type="number" id="profileMaxTokens" placeholder="32768" min="1024" max="384000" />
        <span class="hint">DeepSeek 最多 384000，MiMo 最多 131072。建议保持默认 32768</span>
      </div>
      <div class="profile-editor-actions">
        <button id="saveProfileBtn" class="btn btn-primary">保存配置</button>
        <button id="cancelProfileBtn" class="btn btn-outline">取消</button>
        <button id="deleteProfileBtn" class="btn btn-danger" style="margin-left:auto;">删除</button>
      </div>
    </section>

    <section class="section">
      <h2>翻译设置</h2>
      <div class="form-group">
        <label for="sourceLang">源语言</label>
        <select id="sourceLang">
          <option value="auto">自动检测</option>
          <option value="中文">中文</option>
          <option value="英文">英文</option>
          <option value="日文">日文</option>
          <option value="韩文">韩文</option>
          <option value="法文">法文</option>
          <option value="德文">德文</option>
          <option value="西班牙文">西班牙文</option>
          <option value="俄文">俄文</option>
          <option value="阿拉伯文">阿拉伯文</option>
          <option value="葡萄牙文">葡萄牙文</option>
          <option value="意大利文">意大利文</option>
        </select>
      </div>
      <div class="form-group">
        <label for="targetLang">目标语言</label>
        <select id="targetLang">
          <option value="中文">中文</option>
          <option value="英文">英文</option>
          <option value="日文">日文</option>
          <option value="韩文">韩文</option>
          <option value="法文">法文</option>
          <option value="德文">德文</option>
          <option value="西班牙文">西班牙文</option>
          <option value="俄文">俄文</option>
          <option value="阿拉伯文">阿拉伯文</option>
          <option value="葡萄牙文">葡萄牙文</option>
          <option value="意大利文">意大利文</option>
        </select>
      </div>
    </section>

    <section class="section">
      <h2>翻译风格</h2>
      <div class="form-group">
        <label for="translationStyle">风格</label>
        <select id="translationStyle">
          <option value="default">默认（通顺自然）</option>
          <option value="formal">正式（书面语）</option>
          <option value="concise">简洁（精炼简略）</option>
          <option value="academic">学术（专业术语精确）</option>
        </select>
      </div>
    </section>

    <section class="section">
      <h2>其他设置</h2>
      <div class="form-group toggle-group">
        <label class="toggle-label">
          <span>划词翻译</span>
          <label class="toggle-switch">
            <input type="checkbox" id="enableSelectionTranslation" />
            <span class="toggle-slider"></span>
          </label>
        </label>
        <span class="hint">选中文本时自动弹出翻译浮窗</span>
      </div>
      <div class="form-group toggle-group">
        <label class="toggle-label">
          <span>思考模式</span>
          <label class="toggle-switch">
            <input type="checkbox" id="enableThinking" />
            <span class="toggle-slider"></span>
          </label>
        </label>
        <span class="hint">启用后模型会先输出思维链再回答，提高准确性但降低速度（翻译任务建议关闭）</span>
      </div>
      <div class="form-group toggle-group">
        <label class="toggle-label">
          <span>翻译提示</span>
          <label class="toggle-switch">
            <input type="checkbox" id="autoTranslate" />
            <span class="toggle-slider"></span>
          </label>
        </label>
        <span class="hint">页面加载时弹出翻译提示条</span>
      </div>
      <div class="form-group toggle-group">
        <label class="toggle-label">
          <span>内容精简（Beta）</span>
          <label class="toggle-switch">
            <input type="checkbox" id="enableContentOptimization" />
            <span class="toggle-slider"></span>
          </label>
        </label>
        <span class="hint">仅提取正文区域发送给 AI，减少 Token 消耗（适用于文章类页面）</span>
      </div>
      <div class="form-group toggle-group">
        <label class="toggle-label">
          <span>总结翻译</span>
          <label class="toggle-switch">
            <input type="checkbox" id="enableSummaryTranslation" />
            <span class="toggle-slider"></span>
          </label>
        </label>
        <span class="hint">启用后弹窗将显示「总结翻译」按钮，对网页内容先总结再翻译，大幅降低 Token 消耗</span>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn" class="btn btn-primary">保存设置</button>
      <button id="testBtn" class="btn btn-secondary">测试连接</button>
      <button id="exportBtn" class="btn btn-outline">导出配置</button>
      <button id="importBtn" class="btn btn-outline">导入配置</button>
      <span id="saveStatus" class="save-status"></span>
    </div>
    <input type="file" id="importFileInput" accept=".json" style="display:none;" />
  </div>

  <script src="../lib/api-client.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
